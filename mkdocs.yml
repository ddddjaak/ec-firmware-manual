site_name: "Chipsea Zephyr EC Manual"
site_description: "Zephyr EC Firmware Development Manual"
repo_name: ddddjaak/ec-firmware-manual
repo_url: https://github.com/ddddjaak/ec-firmware-manual

plugins:
  - search
  - minify:
      minify_html: true
  - glightbox

theme:
  name: material
  language: zh
  icon:
    logo: material/chip
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 亮色模式
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 暗色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - content.tooltips
    - content.action.edit
    - content.action.view

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false

copyright: "© 2026 芯海科技 · Powered by MkDocs Material"

nav:
  - 首页: index.md
  - 1. 引言: ch1_引言.md
  - 2. 开发环境准备: ch2_开发环境准备.md
  - 3. 开发包架构概述: ch3_Chipsea_Zephyr_开发包架构概述.md
  - 4. 固件功能模块说明:
      - 概述: ch4/index.md
      - 系统基础设施: ch4/01_系统基础设施.md
      - 主机通信接口: ch4/02_主机通信接口.md
      - 电源管理: ch4/03_电源管理.md
      - 键盘与输入: ch4/04_键盘与输入.md
      - 电池与充电: ch4/05_电池与充电.md
      - 热管理: ch4/06_热管理.md
      - USB与PD: ch4/07_USB与PD.md
      - 安全与固件更新: ch4/08_安全与固件更新.md
      - 外设与存储: ch4/09_外设与存储.md
      - 调试与GPIO: ch4/10_调试与GPIO.md
  - 5. 应用开发指南: ch5_应用开发指南.md
  - 6. 调试与验证: ch6_调试与验证.md
  - 7. 移植与定制: ch7_移植与定制.md
  - 8. 最佳实践与建议: ch8_最佳实践与建议.md
  - 9. 附录: ch9_附录.md
  - 术语表: 术语表.md
