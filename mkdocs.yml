site_name: "Chipsea Zephyr EC Manual"
site_description: "Zephyr EC Firmware Development Manual"
repo_name: ddddjaak/ec-firmware-manual
repo_url: https://github.com/ddddjaak/ec-firmware-manual

plugins:
  - search
  - minify:
      minify_html: true
  - glightbox

theme:
  name: material
  language: zh
  icon:
    logo: material/chip
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 亮色模式
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 暗色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - content.tooltips
    - content.action.edit
    - content.action.view

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false

copyright: "© 2026 芯海科技 · Powered by MkDocs Material"

